<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoLibre Elevation Profile - Demo</title>
    <link
      href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
      #map {
        position: absolute;
        inset: 0;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script type="module">
      import maplibregl from 'maplibre-gl';
      import { ElevationProfileControl } from './src/index.ts';

      const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/liberty',
        center: [7.66, 45.98], // near the Matterhorn for dramatic terrain
        zoom: 10,
      });
      map.addControl(new maplibregl.NavigationControl(), 'top-right');
      map.addControl(
        new ElevationProfileControl({ collapsed: false }),
        'top-right',
      );
    </script>
  </body>
</html>
