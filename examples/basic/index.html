<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoLibre Elevation Profile - Basic Example</title>
    <!-- MapLibre CSS is imported from the local dependency in main.ts. -->
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          sans-serif;
      }
      #map {
        width: 100vw;
        height: 100vh;
      }
      .hint {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 1;
        max-width: 300px;
        padding: 8px 12px;
        font-size: 13px;
        line-height: 1.4;
        color: #1f2a37;
        background: rgba(255, 255, 255, 0.92);
        border-radius: 6px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="hint">
      Open the <strong>mountain icon</strong> (top-right), click
      <strong>Draw line</strong>, then click points across the terrain.
      Double-click to finish and see the elevation profile.
    </div>
    <div id="map"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
